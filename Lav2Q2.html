<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        h1,
        h2 {
            color: #5B9BD5;
            /* Set heading color */
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .header img {
            width: 100px;
            height: auto;
        }

        nav span {
            cursor: pointer;
            /* Change cursor to pointer on hover */
            color: #5B9BD5;
            /* Set nav span color */
            font-size: large;
            /* Set font size for nav links */
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header section with group title and logo -->
        <div class="header">
            <img src="test.png" alt="Group Logo" class="img-fluid"> <!-- Group logo -->
            <nav class="ms-3">
                <span><b>WHO WE ARE</b> |</span>
                <span><b>WHAT WE DO</b> |</span>
                <span><b>CONTACTS</b></span>
            </nav>
        </div>

        <!-- Main content area with two columns -->
        <div class="row mt-4">
            <!-- Left column for group members -->
            <div class="col-lg-8 mb-4">
                <h1>Group 34</h1>
                <h2>COME AND WORK WITH US</h2>
                <p>Marco de Sá</p>
                <img src="marco.png" alt="Group Members" class="img-fluid" style="max-width: 330px; max-height: 540px; width: 100%; height: auto;">
                <p>© group 28 2025</p>
                <P>made by Marco de Sá(20241833)</P>
            </div>
            <!-- Right column for additional information and form -->
            <div class="col-lg-4">
                <h2 id="askInfoTitle">ASK INFO</h2>
                <form id="infoForm">
                    <!-- Email input field -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>
                    <!-- Textarea for user questions -->
                    <div class="mb-3">
                        <label for="question" class="form-label">Your Question:</label>
                        <textarea id="question" name="question" rows="4" class="form-control" required></textarea>
                    </div>
                    <!-- Checkbox for requesting a price -->
                    <div class="form-check mb-3">
                        <label for="price-request" class="form-check-label">Requesting a price?</label>
                        <input type="checkbox" id="price-request" name="price-request" class="form-check-input">
                    </div>
                    <!-- Submit button -->
                    <button type="submit" class="btn btn-primary">Submit</button>
                    <a href="#" id="moreInfoLink" class="d-block mt-2">more information</a>
                </form>
                <!-- More information link -->
                

                <!-- Hidden more information div -->
                <div id="moreInfoDiv" style="display: none;">
                    <h2>more information</h2>
                    <p>Team emails: <br> marcojb.desa@email.com</p>
                    <a href="#" id="askToMeetLink" class="d-block mt-2">ask information</a>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            // Click on "more information" link
            $('#moreInfoLink').click(function(e) {
                e.preventDefault();
                $('#infoForm').hide();
                $('#askInfoTitle').hide();
                $('#moreInfoLink').hide();
                $('#moreInfoDiv').show();
            });

            // Click on "ask to meet us" link
            $('#askToMeetLink').click(function(e) {
                e.preventDefault();
                $('#moreInfoDiv').hide();
                $('#infoForm').show();
                $('#askInfoTitle').show();
                $('#moreInfoLink').show();
            });
        });
    </script>
</body>

</html>
